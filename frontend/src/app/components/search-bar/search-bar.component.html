<div class="search-area">
  <div class="search-input-wrap">
    <input
      #searchInput
      class="search-input"
      type="text"
      [value]="query"
      (input)="onInput(($any($event.target)).value)"
      (focus)="onFocus()"
      (blur)="onBlur()"
      placeholder="ابحث عن كلمة..."
      autocomplete="off"
      aria-label="حقل البحث"
    />

    <span class="search-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" focusable="false">
        <path d="M10 4a6 6 0 1 1 0 12a6 6 0 0 1 0-12m0-2a8 8 0 1 0 4.9 14.3l4.4 4.4a1 1 0 0 0 1.4-1.4l-4.4-4.4A8 8 0 0 0 10 2z"></path>
      </svg>
    </span>
  </div>

  @if (showDropdown) {
    <ul class="dropdown" role="listbox" aria-label="نتائج البحث">
      @if (isLoading) {
        <li class="dropdown-item disabled" aria-disabled="true">جاري البحث...</li>
      }

      @for (word of results; track word.id) {
        <li class="dropdown-item" (mousedown)="selectWord(word, $event)" role="option">
          {{ word.headword }}
        </li>
      }

      @if (shouldShowNoResults) {
        <li class="dropdown-item disabled" aria-disabled="true">لا توجد نتائج</li>
      }

      @if (hasRequestError && !isLoading) {
        <li class="dropdown-item disabled" aria-disabled="true">حدث خطأ أثناء البحث</li>
      }
    </ul>
  }
</div>
