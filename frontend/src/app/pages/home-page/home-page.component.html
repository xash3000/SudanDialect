<main class="page" dir="rtl">
  <section class="search-section">
    <h1 class="title">قاموس اللهجة السودانية</h1>

    <app-search-bar
      [query]="searchQuery()"
      [results]="results()"
      [isLoading]="isLoading()"
      [showDropdown]="showDropdown()"
      [hasRequestError]="hasRequestError()"
      [shouldShowNoResults]="shouldShowNoResults()"
      (queryChanged)="onSearchInput($event)"
      (inputFocused)="onSearchInputFocus()"
      (inputBlurred)="onSearchInputBlur()"
      (wordSelected)="selectWord($event)"
    />

    @if (selectedWord(); as word) {
      <app-word-card [word]="word" />
    }

    @if (hasWordLoadError()) {
      <p class="word-load-error" role="alert">تعذر تحميل الكلمة المطلوبة من الرابط.</p>
    }
  </section>
</main>
